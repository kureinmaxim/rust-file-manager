<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация — Файловый менеджер</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f6f8;
            color: #1f2933;
        }
        .login-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 16px rgba(0,0,0,.06);
        }
        h1 { font-size: 20px; margin: 0 0 8px; text-align: center; }
        .hint { font-size: 13px; color: #6b7280; text-align: center; margin: 0 0 16px; }
        label { display: block; font-size: 13px; color: #6b7280; margin: 14px 0 4px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus { outline: 2px solid #2563eb33; border-color: #2563eb; }
        button {
            width: 100%;
            margin-top: 22px;
            padding: 11px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        button:disabled { opacity: .6; }
        .error {
            display: none;
            margin-top: 14px;
            padding: 10px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
<form class="login-card" id="registerForm">
    <h1>📁 Создание аккаунта</h1>
    <p class="hint">Вас пригласили в файловый менеджер. Придумайте имя и пароль — у вас будет личная папка и доступ к общим файлам.</p>
    <label for="username">Имя пользователя</label>
    <input type="text" id="username" name="username" autocomplete="username"
           pattern="[A-Za-z0-9_\-]{3,32}" title="3–32 символа: латинские буквы, цифры, «_» и «-»" required>
    <label for="password">Пароль (минимум 8 символов)</label>
    <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
    <button type="submit" id="submitBtn">Создать аккаунт</button>
    <div class="error" id="error"></div>
</form>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const button = document.getElementById('submitBtn');
    const errorBox = document.getElementById('error');
    button.disabled = true;
    errorBox.style.display = 'none';

    const params = new URLSearchParams(new FormData(e.target));
    params.set('token', new URLSearchParams(location.search).get('token') || '');

    try {
        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params,
        });
        const data = await response.json();
        if (data.success) {
            location.href = '/';
        } else {
            errorBox.textContent = data.message;
            errorBox.style.display = 'block';
        }
    } catch {
        errorBox.textContent = 'Ошибка соединения с сервером';
        errorBox.style.display = 'block';
    } finally {
        button.disabled = false;
    }
});
</script>
</body>
</html>
